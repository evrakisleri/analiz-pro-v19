<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Analiz Pro v19</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body class="bg-[#050505] text-white p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-blue-500">ANALİZ PRO v19 | MASTER ADMIN</h1>
                <p class="text-gray-400 text-sm">Kurum ve Yönetici Denetim Paneli</p>
            </div>
            <button onclick="location.reload()" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm transition">Sistemi Yenile</button>
        </header>

        <div class="bg-gray-900 p-6 rounded-2xl mb-8 border border-gray-800 flex gap-4">
            <input id="schoolName" placeholder="Yeni Okul/Kurum Adı" class="flex-1 bg-black p-3 rounded-lg border border-gray-700 outline-none focus:border-blue-500">
            <button id="addBtn" class="bg-blue-600 hover:bg-blue-500 px-8 rounded-lg font-bold transition">OKUL EKLE</button>
        </div>

        <div class="bg-gray-900 rounded-2xl overflow-hidden border border-gray-800 shadow-2xl">
            <table class="w-full text-left">
                <thead class="bg-gray-800 text-gray-400 text-xs uppercase tracking-wider">
                    <tr>
                        <th class="p-4">Okul Adı</th>
                        <th class="p-4">Yetkili Müdür</th>
                        <th class="p-4 text-right">İşlem</th>
                    </tr>
                </thead>
                <tbody id="schoolTable"></tbody>
            </table>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module">
        import { supabase } from './supabaseClient.js';

        // Profesyonel Bildirim
        const notify = (m, t="success") => Toastify({
            text: m, 
            duration: 3000, 
            style: { background: t==="success"?"#2563eb":"#dc2626", borderRadius: "8px" }
        }).showToast();

        // Audit Loglama
        async function logAction(action, details) {
            const { data: { user } } = await supabase.auth.getUser();
            await supabase.from('audit_logs').insert({ admin_id: user?.id, action, details });
        }

        async function load() {
            const { data: s } = await supabase.from('schools').select('*, profiles(full_name)');
            const { data: p } = await supabase.from('profiles').select('id, full_name').eq('role', 'principal');
            
            const tbody = document.getElementById('schoolTable');
            tbody.innerHTML = s.map(item => `
                <tr class="border-b border-gray-800 hover:bg-white/5 transition">
                    <td class="p-4 font-medium">${item.name}</td>
                    <td class="p-4">
                        <select onchange="updateMudur('${item.id}', this.value, '${item.name}')" class="bg-black p-2 rounded border border-gray-700 text-sm w-48">
                            <option value="">Müdür Atanmadı</option>
                            ${p.map(mgr => `<option value="${mgr.id}" ${item.principal_id === mgr.id ? 'selected' : ''}>${mgr.full_name}</option>`).join('')}
                        </select>
                    </td>
                    <td class="p-4 text-right">
                        <button onclick="del('${item.id}', '${item.name}')" class="text-red-500 hover:text-red-400 text-sm font-bold">SİSTEMDEN KALDIR</button>
                    </td>
                </tr>
            `).join('');
        }

        window.updateMudur = async (sid, pid, name) => {
            await supabase.from('schools').update({ principal_id: pid || null }).eq('id', sid);
            logAction('MUDUR_ATANDI', { okul: name, yeni_mudur_id: pid });
            notify("Müdür ataması güncellendi.");
        };

        document.getElementById('addBtn').onclick = async () => {
            const name = document.getElementById('schoolName').value;
            if (!name) return notify("Lütfen bir isim girin!", "err");
            await supabase.from('schools').insert({ name });
            logAction('OKUL_EKLENDI', { name });
            document.getElementById('schoolName').value = '';
            notify("Okul sisteme eklendi.");
            load();
        };

        window.del = async (id, name) => {
            if(confirm(`${name} kurumunu silmek istediğine emin misin?`)) {
                await supabase.from('schools').delete().eq('id', id);
                logAction('OKUL_SILINDI', { name });
                notify("Kurum başarıyla silindi.", "err");
                load();
            }
        };

        load();
    </script>
</body>
</html>
